name: Ultimate Daily Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --local user.email "ssshininnsanthu32144@gmail.com"
          git config --local user.name "Santhu32144"

      - name: Process Daily Updates
        run: |
          # 1. Initialize files if they don't exist
          [ -f xp.txt ] || echo "0" > xp.txt
          [ -f streak.txt ] || echo "0" > streak.txt
          [ -f quotes.md ] || touch quotes.md

          # 2. Quotes List
          QUOTES=(
            "Believe you can and you're halfway there.|Theodore Roosevelt"
            "Action is the foundational key to all success.|Pablo Picasso"
            "Your limitation—it's only your imagination.|Anonymous"
            "Push yourself, because no one else is going to do it for you.|Anonymous"
            "Great things never come from comfort zones.|Anonymous"
            "Dream it. Wish it. Do it.|Anonymous"
            "Success doesn’t just find you. You have to go out and get it.|Anonymous"
          )

          # 3. Handle XP and Streak
          XP=$(cat xp.txt)
          STREAK=$(cat streak.txt)
          STREAK=$((STREAK + 1))
          echo "$STREAK" > streak.txt

          # 4. Multi-Commit Loop (4-8 commits)
          COMMIT_COUNT=$((4 + RANDOM % 5))
          echo "Processing $COMMIT_COUNT commits for today..."

          for i in $(seq 1 $COMMIT_COUNT)
          do
            SELECTED=${QUOTES[$RANDOM % ${#QUOTES[@]}]}
            QUOTE=$(echo "$SELECTED" | cut -d'|' -f1)
            AUTHOR=$(echo "$SELECTED" | cut -d'|' -f2)
            DATE=$(date +'%Y-%m-%d %H:%M:%S')

            # Update Log
            echo "| $DATE | $QUOTE | $AUTHOR | +5 XP |" >> quotes.md
            
            # Increment XP
            XP=$((XP + 5))
            echo "$XP" > xp.txt

            # Level Calculation (RPG Style: Level = sqrt(XP/20) approximation using pure bash)
            # Level 1=20XP, 2=80XP, 3=180XP, 4=320XP...
            LEVEL=0
            for l in {1..100}; do
              if [ $XP -ge $((l * l * 20)) ]; then
                LEVEL=$l
              else
                break
              fi
            done

            # Badge Logic
            if [ $LEVEL -lt 5 ]; then BADGE="🌱 Beginner";
            elif [ $LEVEL -lt 10 ]; then BADGE="🔥 Rising";
            elif [ $LEVEL -lt 20 ]; then BADGE="⭐ Achiever";
            else BADGE="👑 Legend"; fi

            # 5. Update README.md
            cat > README.md <<EOF
# 🌞 Daily Motivation Hub

## 💬 Today's Quote
> $QUOTE
> — **$AUTHOR**

## 🔥 Player Stats
| Metric | Value |
| :--- | :--- |
| **Current Level** | $LEVEL |
| **Total XP** | $XP |
| **Current Streak** | $STREAK Days |
| **Rank** | $BADGE |

---
*Last updated: $DATE*
EOF

            git add .
            git commit -m "Automated Update #$i: XP+$((i*5)) [$DATE]" || echo "No changes"
            
            # Small delay to make history look natural
            sleep $((2 + RANDOM % 5))
          done

      - name: Final Push
        run: |
          git push origin main