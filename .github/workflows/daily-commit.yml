name: Daily Motivation Full Auto

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  daily-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Quote + Update Streak + Update README
        run: |
          # Ensure files exist
          touch quotes.md
          if [ ! -f streak.txt ]; then echo "0" > streak.txt; fi

          # ---------------------------------------
          # 🎯 AI-LIKE Daily Generated Quote
          # ---------------------------------------
          QUOTES=(
            "Believe in yourself.|Anonymous"
            "You are stronger than you think.|Anonymous"
            "Every day is a fresh start.|Anonymous"
            "Big journeys begin with small steps.|Anonymous"
            "Push through the hard days.|Anonymous"
            "Your success story begins today.|Anonymous"
            "Dream. Believe. Achieve.|Anonymous"
            "Be unstoppable. Be fearless.|Anonymous"
            "You were born to win.|Anonymous"
          )

          SELECTED=${QUOTES[$RANDOM % ${#QUOTES[@]}]}
          QUOTE=$(echo $SELECTED | cut -d'|' -f1)
          AUTHOR=$(echo $SELECTED | cut -d'|' -f2)

          DATE=$(date +'%Y-%m-%d %H:%M')

          # Add to quotes.md history
          echo "| $DATE | $QUOTE | $AUTHOR |" >> quotes.md

          # ---------------------------------------
          # 🔥 UPDATE STREAK
          # ---------------------------------------
          STREAK=$(cat streak.txt)
          STREAK=$((STREAK + 1))
          echo "$STREAK" > streak.txt

          # ---------------------------------------
          # 🔥 UPDATE README.md
          # ---------------------------------------
          awk -v quote="$QUOTE" -v streak="$STREAK" -v date="$DATE" '
            /<!--QUOTE_START-->/ {print; getline; print quote; next}
            /<!--STREAK_START-->/ {print; getline; print streak; next}
            /<!--DATE_START-->/ {print; getline; print date; next}
            {print}
          ' README.md > temp.md && mv temp.md README.md

          # ---------------------------------------
          # Commit updates
          # ---------------------------------------
          git config --local user.email "ssshininnsanthu32144@gmail.com"
          git config --local user.name "Santhu32144"

          git add .
          git commit -m "Auto-update: Quote + Streak + README ($DATE)" || echo "No changes"

          git push